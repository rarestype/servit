name: Tests

permissions:
    contents: write
on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]

jobs:
    changes:
        runs-on: ubuntu-latest
        name: Assess changes
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Decide checks 💖
                uses: tj-actions/changed-files@v47
                id: changes
                with:
                    files_ignore: |
                        README.md
                        LICENSE
                        NOTICE
                        .mailmap
                        .gitignore
                        .github/FUNDING.yml
        outputs:
            code_changed: ${{ steps.changes.outputs.any_changed }}

    Linux:
        runs-on: ubuntu-24.04
        name: Ubuntu 24.04
        needs: changes
        if: ${{ needs.changes.outputs.code_changed == 'true' }}
        steps:
            -   name: 💖 Install Swift 💖
                uses: rarestype/swift-install-action@v1
                with:
                    swift-prefix: "swift-6.3-release/ubuntu2404/swift-6.3-RELEASE"
                    swift-id: "swift-6.3-RELEASE-ubuntu24.04"

            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Check format 💖
                run: Scripts/Format

            -   name: 💖 Run tests 💖
                run: Scripts/TestDemo

            -   name: 💖 Run tests (swift-async-algorithms) 💖
                run: Scripts/TestDemo
                env:
                    SWIFT_ASYNC_ALGORITHMS: 1

            -   name: 💖 Update badge 💖
                uses: rarestype/rarestbadge@v1
                if: always()

    macOS:
        runs-on: macos-26
        needs: changes
        if: ${{ needs.changes.outputs.code_changed == 'true' }}
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Select Xcode 26.4 💖
                run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

            -   name: 💖 Check format 💖
                run: Scripts/Format

            -   name: 💖 Run tests 💖
                run: Scripts/TestDemo

            -   name: 💖 Run tests (swift-async-algorithms) 💖
                run: Scripts/TestDemo
                env:
                    SWIFT_ASYNC_ALGORITHMS: 1

            -   name: 💖 Update badge 💖
                uses: rarestype/rarestbadge@v1
                if: always()
